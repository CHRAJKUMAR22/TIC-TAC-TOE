name: Build, Analyze, Scan, Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  build-analyze-scan:
    runs-on: Eks githubactions-eks

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Runner
        run: echo "Self-hosted Runner Working"

      - name: Install Dependencies
        run: npm install

      - name: Trivy File Scan
        run: trivy fs . > trivyfs.txt

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t tic-tac-toe .

      - name: Tag Docker Image
        run: docker tag tic-tac-toe sevenajay/tic-tac-toe:latest

      - name: Push Docker Image
        run: docker push sevenajay/tic-tac-toe:latest

      - name: Trivy Image Scan
        run: trivy image sevenajay/tic-tac-toe:latest > trivyimage.txt

      # ✅ Slack Notification (Build Stage)
      - name: Slack Notification - Build Stage
        if: always()
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
          channel: '#githubactions-eks'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy:
    needs: build-analyze-scan
    runs-on: Eks githubactions-eks

    steps:
      - name: Pull Docker Image
        run: docker pull sevenajay/tic-tac-toe:latest

      - name: Trivy Image Scan (Deploy Stage)
        run: trivy image sevenajay/tic-tac-toe:latest > trivyimagedeploy.txt

      - name: Deploy Container
        run: |
          docker rm -f game || true
          docker run -d --name game -p 3000:3000 sevenajay/tic-tac-toe:latest

      - name: Update kubeconfig
        run: aws eks --region us-east-1 update-kubeconfig --name EKS_CLOUD

      - name: Deploy to Kubernetes
        run: kubectl apply -f deployment-service.yml

      # ✅ Slack Notification (Deploy Stage)
      - name: Slack Notification - Deploy Stage
        if: always()
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
          channel: '#githubactions-eks'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
